name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm codegen
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test

  spec-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '25'
      - run: node tools/codegen/spec-diff.mjs
        continue-on-error: true
        id: drift
      - if: steps.drift.outcome == 'failure'
        run: |
          echo "::warning::Upstream MRA spec has drifted. See tools/codegen/README.md."
