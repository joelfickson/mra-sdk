name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm codegen
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - name: Detect NPM_TOKEN
        id: token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
            echo "NPM_TOKEN present - will publish if there are no pending changesets."
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "NPM_TOKEN not set - workflow will only manage the version PR."
          fi
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: ${{ steps.token.outputs.has_token == 'true' && 'pnpm release' || '' }}
          version: pnpm changeset version
          commit: 'chore: version packages'
          title: 'Release: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
