name: Release

# Manual-only. Trigger from the Actions tab once an `NPM_TOKEN` secret is set
# and you're ready to cut a version. The `Actions -> Release -> Run workflow`
# button kicks off this job; nothing publishes on regular pushes.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build + pack, do not publish)'
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm codegen
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - name: Pack tarball (always - useful artifact for inspection)
        run: pnpm --filter mra-sdk pack --pack-destination "$RUNNER_TEMP"
      - uses: actions/upload-artifact@v4
        with:
          name: mra-sdk-tarball
          path: ${{ runner.temp }}/mra-sdk-*.tgz
      - name: Publish to npm
        if: ${{ inputs.dry_run == false }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not set. Add it via 'gh secret set NPM_TOKEN' before re-running."
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > ~/.npmrc
          pnpm --filter mra-sdk publish --no-git-checks --access public
